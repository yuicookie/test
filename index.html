<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>LINEクッキーラン</title>
  <link rel="stylesheet" href="title.css">
  <link rel="stylesheet" href="lobby.css">
  <script src="https://code.jquery.com/jquery-3.6.1.js" integrity="sha256-3zlB5s2uwoUzrXK3BT7AX3FyvojsraNFxCc2vC/7pNI=" crossorigin="anonymous"></script>
</head>

<!-- 画像ドラッグ禁止 -->
<body onMouseDown="return false;" onSelectStart="return false">
<!-- タイトル画像 -->
<div id="title_area" class="title_area">
  <img id="title" class="title" src="img/title.png">
  <img id="kiyaku" class="kiyaku" src="img/kiyaku.png">
  <div id="kiyaku_title" class="kiyaku_title">利用規約</div>
  <div id="kiyaku_setumei" class="kiyaku_setumei">・BGMが鳴ります！<br><br>・LINEバージョンを懐かしむため<br>　だけのサイトです。</div>
  <img id="agree" class="agree" src="img/agree.png">
  <img id="agree_black" class="agree_black" src="img/agree_black.png">
  <img id="agree_check" class="agree_check" src="img/agree_check.png">
  <img id="ok_btn" class="ok_btn" src="img/ok_btn.png">
  <img id="ok_btn_black" class="ok_btn_black" src="img/ok_btn_black.png">
</div>

<!-- ロビー画像 -->
<div id="lobby_area" class="lobby_area">
  <img id="lobby_epN01" class="lobby_epN01" src="img/lobby_epN01.png">
  <img id="level_max" class="level_max" src="img/level_max.png">
  <img id="package" class="package" src="img/package.png">
  <img id="crystal_box" class="crystal_box" src="img/crystal_box.png">
  <img id="coin_box" class="coin_box" src="img/coin_box.png">
  <img id="heart_box" class="heart_box" src="img/heart_box.png">
  <img id="setting" class="setting" src="img/setting.png">
  <img id="league_header" class="league_header" src="img/league_header.png">
  <img id="league_footer" class="league_footer" src="img/league_footer.png">
</div>
</body>
<script type="text/javascript" src="script.js"></script>
</html>
